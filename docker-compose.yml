services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: newsbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    env_file: .env
    command: ["uv", "run", "celery", "-A", "celery_worker", "worker", "--loglevel=info"]
    depends_on:
      - app
      - redis

  celery_beat:
    build: .
    env_file: .env
    command: ["uv", "run", "celery", "-A", "celery_worker", "beat", "--loglevel=info"]
    depends_on:
      - app
      - redis

  flower:
    build: .
    env_file: .env
    command: ["uv", "run", "celery", "-A", "celery_worker", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  pgdata:
